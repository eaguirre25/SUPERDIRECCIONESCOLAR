<!doctype html><html lang='es'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Superdirección Escolar</title><style>
:root{--bg:#030812;--fg:#eaf4ff;--muted:#9db3d7;--line:rgba(116,229,255,.18);--cyan:#62f2ff}*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;background:#030812;color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,sans-serif}body{background:radial-gradient(circle at 20% 16%,rgba(93,242,255,.18),transparent 32%),radial-gradient(circle at 82% 78%,rgba(255,88,166,.13),transparent 30%),linear-gradient(135deg,#02050d,#07162c 55%,#02050d)}body:before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(98,242,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(98,242,255,.05) 1px,transparent 1px);background-size:34px 34px;mask-image:radial-gradient(circle,#000 38%,transparent 86%);pointer-events:none}.shell{height:100%;display:grid;grid-template-rows:78px 1fr 68px;position:relative}.top,.foot{display:flex;align-items:center;justify-content:space-between;padding:0 36px;border-color:var(--line);background:rgba(5,14,29,.62);backdrop-filter:blur(10px)}.top{border-bottom:1px solid var(--line)}.foot{border-top:1px solid var(--line);font-size:14px;letter-spacing:.13em;text-transform:uppercase;color:rgba(234,244,255,.62)}h1{margin:0;font-size:19px;letter-spacing:.18em;text-transform:uppercase;text-shadow:0 0 22px rgba(98,242,255,.55)}.bars{display:flex;gap:10px}.bars i{display:block;width:74px;height:9px;border-radius:99px;background:var(--c);box-shadow:0 0 18px var(--c),0 0 34px var(--c)}.main{min-height:0;display:grid;grid-template-columns:55% 45%;gap:24px;padding:24px 36px}.stage,.panel{min-height:0;border:1px solid var(--line);border-radius:28px;background:linear-gradient(145deg,rgba(11,28,57,.82),rgba(3,8,18,.88));box-shadow:0 35px 90px rgba(0,0,0,.52),inset 0 0 0 1px rgba(255,255,255,.045),inset 0 0 56px rgba(98,242,255,.055)}.stage{position:relative;display:grid;place-items:center;perspective:1200px;overflow:hidden}.stage:after{content:'CONSTELACIÓN PLURINORMATIVA';position:absolute;left:32px;bottom:28px;font-size:14px;letter-spacing:.22em;color:rgba(98,242,255,.68);text-shadow:0 0 18px rgba(98,242,255,.85)}.holo{width:min(88%,680px);aspect-ratio:1;display:grid;place-items:center;transform-style:preserve-3d;animation:float 5s ease-in-out infinite}.holo svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 38px 38px rgba(0,0,0,.55))}.tilt{transform:rotateX(58deg) rotateZ(-13deg);transform-origin:0 0;filter:drop-shadow(0 32px 10px rgba(0,0,0,.32))}.slice{cursor:pointer;transition:opacity .35s,filter .35s}.slice.active{opacity:1!important;filter:drop-shadow(0 0 14px var(--c)) drop-shadow(0 0 38px var(--c))}.slice.dim{opacity:.42}.slice.seen{opacity:.72}.node{filter:drop-shadow(0 0 14px var(--c)) drop-shadow(0 0 34px var(--c))}.coreGlow{filter:drop-shadow(0 0 24px rgba(98,242,255,.9)) drop-shadow(0 0 55px rgba(143,134,255,.35))}.pulse{animation:pulse 2s ease-in-out infinite}.hud{position:absolute;top:28px;right:28px;display:flex;flex-direction:column;gap:12px}.hud button{width:64px;height:50px;border:2px solid var(--c);border-radius:14px;background:rgba(0,0,0,.22);color:var(--c);font-weight:900;font-size:20px;cursor:pointer;box-shadow:0 0 20px rgba(98,242,255,.08);transition:.25s}.hud button:hover,.hud button.active{background:var(--c);color:#01040a;transform:translateX(-4px);box-shadow:0 0 28px var(--c)}.panel{padding:30px;overflow:hidden}.content{height:100%;overflow:auto;padding-right:10px;transition:opacity .35s,transform .35s}.content::-webkit-scrollbar{width:8px}.content::-webkit-scrollbar-thumb{background:rgba(98,242,255,.38);border-radius:99px}.hint{height:100%;display:grid;place-items:center;text-align:center;color:var(--muted);font-size:30px;line-height:1.25}.hint b{display:block;margin-top:18px;color:#ffd166;letter-spacing:.18em;text-transform:uppercase;text-shadow:0 0 16px #ffd166,0 0 42px #ff8c00}.title{border-left:9px solid var(--c);padding-left:22px;margin-bottom:24px}.title h2{margin:0 0 10px;color:var(--c);font-size:clamp(42px,4.6vw,68px);line-height:.96;text-shadow:0 0 24px var(--c)}.title p{margin:0;color:rgba(234,244,255,.55);font-size:18px;letter-spacing:.15em;text-transform:uppercase}.sub{margin:18px 0;padding:18px;border:1px solid rgba(255,255,255,.1);border-radius:20px;background:rgba(255,255,255,.045);box-shadow:inset 0 0 30px rgba(255,255,255,.025)}.sub h3{margin:0 0 14px;font-size:32px;line-height:1.08;color:#fff}.roles{display:grid;gap:11px}.role{font-size:24px;line-height:1.22;padding:14px 16px;border-left:4px solid var(--c);border-radius:0 14px 14px 0;background:rgba(255,255,255,.06);box-shadow:0 12px 24px rgba(0,0,0,.18)}.legend{color:#ffd166;font-size:25px;font-weight:900;text-shadow:0 0 16px #ffd166,0 0 44px #ff8c00}@keyframes float{0%,100%{transform:translateY(0) rotateX(0)}50%{transform:translateY(-14px) rotateX(5deg)}}@keyframes pulse{0%,100%{opacity:.72}50%{opacity:1}}@media(max-width:1000px){html,body{overflow:auto}.shell{height:auto;min-height:100%}.main{grid-template-columns:1fr}.stage{min-height:560px}.panel{min-height:620px}.hud{position:static;flex-direction:row;margin-top:16px}.title h2{font-size:42px}.role{font-size:21px}}
</style></head><body><div class='shell'><header class='top'><h1>Superdirección Escolar</h1><div class='bars' id='bars'></div></header><main class='main'><section class='stage'><div class='holo'><svg viewBox='-260 -260 520 520' aria-label='Gráfico radial interactivo'><defs><radialGradient id='core' cx='35%' cy='28%'><stop offset='0' stop-color='#ecffff'/><stop offset='.28' stop-color='#62f2ff'/><stop offset='1' stop-color='#050b18'/></radialGradient></defs><g class='tilt'><ellipse cx='0' cy='18' rx='205' ry='205' fill='rgba(0,0,0,.24)'/><g id='rotor'></g></g><g id='nodes'></g><circle r='82' fill='url(#core)' stroke='#62f2ff' stroke-width='2' class='coreGlow'/><circle r='102' fill='none' stroke='rgba(98,242,255,.35)' stroke-width='4' stroke-dasharray='16 12' class='pulse'/><text y='-18' text-anchor='middle' font-size='25' font-weight='900' fill='#edf5ff' letter-spacing='2'>SUPER</text><text y='17' text-anchor='middle' font-size='24' font-weight='900' fill='#02050d' letter-spacing='1'>DIRECCIÓN</text><text y='48' text-anchor='middle' font-size='13' font-weight='800' fill='rgba(237,245,255,.72)' letter-spacing='6'>ESCOLAR</text></svg></div><nav class='hud' id='hud'></nav></section><section class='panel'><div class='content' id='panel'><div class='hint'>Presioná 1–5 o tocá el gráfico para desplegar la información lateral.<b>66 funciones asignadas</b></div></div></section></main><footer class='foot'><span>Constelación plurinormativa</span><span class='legend'>66 funciones asignadas</span></footer></div><script>
const D=[['I. Pedagógicos y curriculares','I','#8f86ff',[['Liderazgo pedagógico',['Conductor/a del Proyecto Institucional (PI)','Responsable de la calidad educativa','Promotor/a de la innovación pedagógica','Articulador/a curricular']],['Organización y planificación escolar',['Planificador/a del ciclo lectivo','Coordinador/a de evaluaciones','Gestor/a de trayectorias educativas','Organizador/a de espacios y tiempos escolares']],['Implementación de programas específicos',['Coordinador/a de Aulas de Fortalecimiento (AFTE)','Facilitador/a de Educación Profesional Secundaria','Promotor/a de Prácticas Formativas','Supervisor/a de Centros de Estudiantes','Coordinador/a de Programas de Inclusión','Gestor/a de educación en contextos especiales','Facilitador/a de Consejo Consultivo Estudiantil']]]],['II. Gestión institucional','II','#27f2b4',[['Administración y organización escolar',['Administrador/a de recursos humanos','Gestor/a de Plantas Orgánico Funcionales (POF)','Conductor/a de equipos directivos','Administrador/a de recursos materiales','Administrador/a de fondos de programas y proyectos','Encargado/a de patrimonio escolar']],['Relaciones intersectoriales e interinstitucionales',['Articulador/a comunitario','Coordinador/a de servicios de apoyo','Asesor/a de Cooperación Escolar','Facilitador/a de actividades comunitarias','Promotor/a de experiencias extraescolares','Representante institucional']],['Comunicación y documentación',['Comunicador/a institucional','Registrador/a oficial','Informante al sistema educativo','Interlocutor/a con familias']]]],['III. Convivencia y bienestar','III','#ff784d',[['Gestión de la convivencia escolar',['Promotor/a de convivencia democrática','Coordinador/a del Consejo Institucional de Convivencia','Mediador/a de conflictos','Garante de derechos estudiantiles','Facilitador/a de participación estudiantil','Responsable de sanciones educativas']],['Inclusión y no discriminación',['Promotor/a de inclusión','Facilitador/a de Educación Sexual Integral (ESI)','Garante de diversidad','Protector/a de derechos de maternidad/paternidad']],['Atención a situaciones especiales',['Encargado/a de Ámbitos Especiales','Responsable de inclusión de estudiantes con discapacidad','Gestor/a de programas socioeducativos','Responsable de Intervención ante Vulneración de Derechos','Vinculador/a con el Sistema de Protección','Responsable de Acompañamiento a la maternidad/paternidad adolescente']]]],['IV. Supervisión y control','IV','#ffd166',[['Cumplimiento normativo',['Veedor/a del cumplimiento normativo','Supervisor/a de procedimientos','Responsable de seguridad e higiene','Verificador/a de asistencia','Articulador/a de protocolos de emergencia','Aplicador/a del Régimen Disciplinario','Certificador/a de Documentación y Políticas Sociales']],['Evaluación y seguimiento',['Evaluador/a Institucional','Supervisor/a de desempeño académico','Gestor/a de evaluaciones externas','Productor/a de información estadística escolar']]]],['V. Desarrollo profesional','V','#ff5fa2',[['Formación y capacitación',['Promotor/a de desarrollo profesional','Organizador/a de Jornadas Institucionales y reuniones de personal','Mentor/a de equipos docentes']],['Innovación y tecnología',['Promotor/a de innovación tecnológica','Gestor/a de ambientes virtuales','Responsable de alfabetización digital']],['Sustentabilidad y medio ambiente',['Promotor/a de Educación Ambiental','Gestor/a de prácticas sustentables']]]]];
const total=66,rotor=document.getElementById('rotor'),nodes=document.getElementById('nodes'),panel=document.getElementById('panel'),hud=document.getElementById('hud'),bars=document.getElementById('bars');let spin=0,focus=0,active=-1,seen=new Set();const NS='http://www.w3.org/2000/svg';function polar(r,a){a=(a-90)*Math.PI/180;return [r*Math.cos(a),r*Math.sin(a)]}function arc(r0,r1,a0,a1){const p0=polar(r1,a0),p1=polar(r1,a1),p2=polar(r0,a1),p3=polar(r0,a0),l=a1-a0>180?1:0;return`M${p0}A${r1},${r1} 0 ${l} 1 ${p1}L${p2}A${r0},${r0} 0 ${l} 0 ${p3}Z`}function el(n,o){const e=document.createElementNS(NS,n);for(const k in o)e.setAttribute(k,o[k]);return e}let a=-90;D.forEach((d,i)=>{let n=d[3].flatMap(x=>x[1]).length,ang=n/total*360,a0=a+3,a1=a+ang-3;let p=el('path',{d:arc(88,178,a0,a1),fill:d[2],opacity:.42,class:'slice dim','data-i':i,style:`--c:${d[2]}`});p.onclick=()=>select(i);rotor.appendChild(p);let mid=(a0+a1)/2,[x,y]=polar(218,mid),[tx,ty]=polar(250,mid);nodes.appendChild(el('circle',{cx:x,cy:y,r:9,fill:d[2],class:'node',style:`--c:${d[2]}`}));let t=el('text',{x:tx,y:ty,'text-anchor':'middle','dominant-baseline':'middle',fill:d[2],'font-size':24,'font-weight':900});t.textContent=d[1];nodes.appendChild(t);let b=document.createElement('button');b.textContent=d[1];b.style.setProperty('--c',d[2]);b.onclick=()=>select(i);hud.appendChild(b);let bar=document.createElement('i');bar.style.setProperty('--c',d[2]);bars.appendChild(bar);a+=ang});rotor.insertBefore(el('circle',{r:198,fill:'none',stroke:'rgba(98,242,255,.18)','stroke-width':6,'stroke-dasharray':'12 14'}),rotor.firstChild);rotor.insertBefore(el('circle',{r:64,fill:'none',stroke:'rgba(255,255,255,.24)','stroke-width':4,'stroke-dasharray':'10 12'}),rotor.firstChild);function select(i){active=i;seen.add(i);document.querySelectorAll('.slice').forEach((s,j)=>{s.classList.toggle('active',j===i);s.classList.toggle('seen',seen.has(j)&&j!==i)});[...hud.children].forEach((b,j)=>b.classList.toggle('active',j===i));let d=D[i],count=d[3].flatMap(x=>x[1]).length;panel.style.opacity=0;panel.style.transform='translateX(38px)';setTimeout(()=>{panel.innerHTML=`<div class='title' style='--c:${d[2]}'><h2>${d[0]}</h2><p>${count} funciones · ${d[3].length} subdimensiones</p></div>`+d[3].map(s=>`<section class='sub'><h3>${s[0]}</h3><div class='roles'>${s[1].map(r=>`<div class='role' style='--c:${d[2]}'>${r}</div>`).join('')}</div></section>`).join('');panel.style.opacity=1;panel.style.transform='translateX(0)'},180);let counts=D.map(x=>x[3].flatMap(y=>y[1]).length),start=counts.slice(0,i).reduce((s,x)=>s+x,0)/total*360,mid=start+count/total*180;focus=90-mid}document.addEventListener('keydown',e=>{if(/[1-5]/.test(e.key))select(+e.key-1)});function tick(){spin+=active<0?.10:.035;rotor.setAttribute('transform',`rotate(${spin+focus})`);requestAnimationFrame(tick)}tick();setTimeout(()=>select(0),700);
</script></body></html>
